name: Link check

# Catches link rot in README + plan docs. Runs on PR (docs-only diff)
# and scheduled weekly so external links that die don't accumulate
# silently.

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 5 * * 1' # 05:00 UTC Monday

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: lycheeverse/lychee-action@v2
        with:
          # Skip the self-referencing URL the CI-Gate-aggregator uses, and
          # any CLAUDE.md @-import strings (they're file paths, not URLs).
          args: >-
            --no-progress
            --verbose
            --exclude-mail
            --exclude '^@.+'
            --exclude 'https://claude\.ai/code/'
            --exclude 'https://github\.com/thekevinscott/put-it-out-there/issues/\d+'
            --exclude 'https://github\.com/thekevinscott/put-it-out-there/pull/\d+'
            './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
